services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/app.db
      SESSION_DB_PATH: /data/sessions.db
      SESSION_SECRET: change-this-before-production
      SESSION_COOKIE_SECURE: "false"
      TRUST_PROXY: "true"
      ENABLE_CSRF: "true"
      BOOTSTRAP_SUPER_ADMIN_NAME: Sankofa Super Admin
      BOOTSTRAP_SUPER_ADMIN_EMAIL: admin@sankofa-company.org
      BOOTSTRAP_SUPER_ADMIN_PASSWORD: change-this-before-production
    volumes:
      - sakofa_data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  sakofa_data:
